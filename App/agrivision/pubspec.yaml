name: agrivision
description: "AgriVision -> An AI Powered Mobile application for Farmers for crop disease prediction and crop recommendation."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  pinput: ^6.0.1
  camera: ^0.11.3
  image_picker: ^1.2.1
  flutter_floating_bottom_bar: ^1.3.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0
  geolocator: ^14.0.1
  shimmer: ^3.0.0
  image: ^4.8.0
  tflite_flutter: ^0.12.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true


flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/languages/
    - assets/models/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          style: italic
